name: Build Tweak

on: [workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # 安装 ldid 签名工具
          brew install ldid
          
          export THEOS=~/theos
          sudo rm -rf $THEOS
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          rm -rf $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks
          cd $THEOS
          git submodule update --init --recursive
          
      - name: Build Package
        run: |
          export THEOS=~/theos
          # 增加 -j8 参数启用多核编译加速
          make package FINALPACKAGE=1 -j8
        
      - name: Extract Dylib
        run: |
          mkdir -p extracted
          # 检查 packages 目录是否存在
          if [ -d "packages" ]; then
            DEB_FILE=$(ls packages/*.deb | head -n 1)
            ar x $DEB_FILE
            tar -xf data.tar.*
            cp Library/MobileSubstrate/DynamicLibraries/*.dylib extracted/
            cp Library/MobileSubstrate/DynamicLibraries/*.plist extracted/
          else
            # 如果没有生成 deb，尝试直接从 .theos 提取编译好的文件
            echo "DEB not found, extracting from .theos/obj"
            cp .theos/obj/*.dylib extracted/
            cp *.plist extracted/
          fi

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: TelegramSiriFix-deb
          path: packages/*.deb

      - name: Upload Dylib & Plist
        uses: actions/upload-artifact@v4
        with:
          name: TelegramSiriFix-Dylib-Files
          path: extracted/*
