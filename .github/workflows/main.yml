name: Build Tweak

on: [workflow_dispatch]

# 注入环境变量以支持最新的 Node.js 运行环境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          # 使用 --depth 1 加快克隆速度
          git clone --depth 1 --recursive https://github.com/theos/theos.git $THEOS
          # 自动获取最新的 SDK
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks
          
      - name: Build Package
        run: |
          export THEOS=~/theos
          # 强制指定 arm64 架构以减少编译冲突
          make package FINALPACKAGE=1
        
      - name: Extract Dylib
        run: |
          mkdir -p extracted
          # 找到打包好的 deb 文件并解压
          DEB_FILE=$(ls packages/*.deb | head -n 1)
          ar x $DEB_FILE
          # 解压数据层
          tar -xf data.tar.*
          # 提取 dylib 和 plist
          cp Library/MobileSubstrate/DynamicLibraries/*.dylib extracted/
          cp Library/MobileSubstrate/DynamicLibraries/*.plist extracted/

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: TelegramSiriFix-deb
          path: packages/*.deb

      - name: Upload Dylib & Plist
        uses: actions/upload-artifact@v4
        with:
          name: TelegramSiriFix-Dylib-Files
          path: extracted/*
